name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Clone design system as sibling
        run: git clone https://github.com/pwnixon/design-system.git ../_template

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install design system dependencies
        run: cd ../_template && npm ci

      - run: npm ci

      - run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
