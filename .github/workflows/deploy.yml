name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm install
        env:
          npm_config_prefer_online: true

      # Re-resolve the design system to the latest main on every deploy so DS pushes
      # reach this prototype (the lockfile otherwise pins it to an old commit, and a
      # plain npm install / --prefer-online won't move a locked git SHA). Everything
      # else stays pinned by package-lock.json for reproducible builds.
      - run: npm install --prefer-online @archera/design-system@github:pwnixon/design-system#main

      - run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - uses: actions/deploy-pages@v5
        id: deployment
