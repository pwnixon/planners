<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commitment Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>html, body, #root { height: 100%; margin: 0; padding: 0; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js"></script>
    <script type="module" src="/main.jsx"></script>
    <script>
      (function () {
        function createToolbar() {
          if (document.getElementById('fg-toolbar')) return;

          const bar = document.createElement('div');
          bar.id = 'fg-toolbar';
          Object.assign(bar.style, {
            position: 'fixed', top: '12px', right: '12px', zIndex: '2147483647',
            display: 'flex', gap: '6px', alignItems: 'center',
            background: '#1e1e2e', borderRadius: '10px', padding: '6px 10px',
            boxShadow: '0 2px 12px rgba(0,0,0,0.35)', fontFamily: 'Inter,system-ui,sans-serif',
            fontSize: '12px', fontWeight: '500', color: '#fff', userSelect: 'none',
          });

          const logo = document.createElement('div');
          logo.innerHTML = `<svg width="14" height="14" viewBox="0 0 80 80" fill="none"><path d="M26.7 10.6C27.8 7.2 32.5 7.2 33.6 10.6L38.7 27.2C39.1 28.3 40 29.2 41.1 29.6L57.8 34.6C61.2 35.6 61.2 40.4 57.8 41.4L41.1 46.4C40 46.7 39.1 47.6 38.7 48.8L33.6 65.3C32.5 68.7 27.8 68.7 26.7 65.3L21.6 48.8C21.3 47.6 20.4 46.7 19.2 46.4L2.6 41.4C-.9 40.4-.9 35.6 2.6 34.6L19.2 29.6C20.4 29.2 21.3 28.3 21.6 27.2Z" fill="#7101FF"/></svg>`;
          Object.assign(logo.style, { display: 'flex', alignItems: 'center', opacity: '0.85' });

          const btn = document.createElement('button');
          btn.textContent = 'Send to Figma';
          Object.assign(btn.style, {
            background: '#7101FF', border: 'none', borderRadius: '6px',
            color: '#fff', fontSize: '12px', fontWeight: '600', cursor: 'pointer',
            padding: '4px 10px', fontFamily: 'inherit', letterSpacing: '0.01em',
            transition: 'background 0.15s',
          });
          btn.onmouseenter = () => btn.style.background = '#5500cc';
          btn.onmouseleave = () => btn.style.background = '#7101FF';

          const status = document.createElement('span');
          Object.assign(status.style, { color: 'rgba(255,255,255,0.5)', fontSize: '11px', display: 'none' });

          btn.onclick = function () {
            const figma = window.figma;
            if (!figma || !figma.captureForDesign) {
              status.textContent = 'Script not ready';
              status.style.display = '';
              setTimeout(() => { status.style.display = 'none'; }, 3000);
              return;
            }
            btn.textContent = 'Capturing…';
            btn.disabled = true;
            status.style.display = 'none';
            figma.captureForDesign({ selector: 'body' }).then(function (result) {
              btn.textContent = result && result.success === false ? 'Failed' : 'Copied!';
              setTimeout(function () { btn.textContent = 'Send to Figma'; btn.disabled = false; }, 2500);
            }).catch(function (err) {
              btn.textContent = 'Error';
              status.textContent = String(err).slice(0, 40);
              status.style.display = '';
              setTimeout(function () { btn.textContent = 'Send to Figma'; btn.disabled = false; status.style.display = 'none'; }, 3000);
            });
          };

          bar.appendChild(logo);
          bar.appendChild(btn);
          bar.appendChild(status);
          document.body.appendChild(bar);
        }

        if (document.body) createToolbar();
        else document.addEventListener('DOMContentLoaded', createToolbar);
      })();
    </script>
  </body>
</html>
